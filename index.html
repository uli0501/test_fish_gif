<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬 NFC 頁面</title>
    <style>
        /* 基礎排版設定，讓畫面置中並具有現代感 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9; /* 淺灰底色，可自行更改 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
        }
        
        /* 內容區塊的卡片樣式 */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 85%;
            width: 320px;
            text-align: center;
        }

        /* GIF 圖片樣式，確保不會超出卡片 */
        img.gif-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #222;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="my-animation.gif" alt="我的動畫" class="gif-image">
        
        <h1>哈囉，我是ＯＯＯ！</h1>
        <p>很高興認識你！這是一段簡單的自我介紹文字。透過這個 NFC 標籤，你可以隨時看到我的最新動態。</p>
    </div>

</body>
</html>
