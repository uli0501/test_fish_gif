<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孔雀魚</title>
    <style>
        /* 移除瀏覽器預設邊距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出現滾動條 */
            background-color: #000; /* 圖片載入前顯示黑色 */
        }

        .full-screen-gif {
            width: 100vw;
            height: 100vh;
            /* 關鍵：讓 GIF 填滿螢幕，會依比例自動裁切邊緣以適應不同手機螢幕 */
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <img src="bg.gif" alt="Background GIF" class="full-screen-gif">

</body>
</html>
