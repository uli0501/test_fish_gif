<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孔雀魚</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #1a1a1a; /* 圖沒跑出來時的深灰色背景 */
            font-family: sans-serif;
        }
        .gif-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* 請確保下方的 fish.gif 與你上傳的檔名完全一致（注意大小寫） */
            background: url('bg.gif') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        .content {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100%;
            color: white; text-align: center; padding: 0 20px;
        }
        h1 { font-size: 2.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        p { font-size: 1.2rem; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="gif-background"></div>
    <div class="overlay"></div>
    <div class="content">
        <h1>孔雀魚專屬頁面</h1>
        <p>這是一個滿版 GIF 的測試效果。<br>如果看到這行字但沒看到魚，代表圖片路徑有誤。</p>
    </div>
</body>
</html>
