<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測試</title>
    <style>
        /* 移除所有邊距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隱藏捲軸 */
            background-color: #000; /* 影片載入前顯示黑色 */
        }

        /* 影片容器設定 */
        .fullscreen-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 關鍵：讓影片像壁紙一樣填滿螢幕，不論螢幕比例如何都會自動裁切 */
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>

    <video 
    class="fullscreen-video" 
    src="bg.mp4" 
    playsinline 
    autoplay 
    muted 
    loop 
    style="background: black;">
</video>

</body>
</html>
