<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試 - 響應式全螢幕背景</title>
    <style>
        /* 移除瀏覽器預設邊距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            /* 2. 使用 min-height 並優先採用 dvh (動態視窗高度) 
               解決行動裝置網址列伸展時的跳動與遮擋問題 */
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; /* 防止出現滾動條 */
            background-color: #000; 
        }

        .full-screen-gif {
            width: 100%;
            height: 100%;
            /* 3. 核心：object-fit: cover 確保填滿但不變形 */
            object-fit: cover;	
            /* 4. 確保 GIF 的中心點始終保持在畫面中央，即使邊緣被裁切 */
            object-position: center center;
            display: block;
        }

        /* 5. 選用：針對超寬螢幕或平板的額外微調（如果需要的話） */
        @media (orientation: landscape) {
            .full-screen-gif {
                /* 橫向模式時的特殊設定可寫在這裡 */
            }
        }
    </style>
</head>
<body>

    <img src="bg.gif" alt="Background GIF" class="full-screen-gif">

</body>
</html>
